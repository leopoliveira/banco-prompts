<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Banco de Prompts{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="{% url 'prompts:index' %}" class="text-xl font-bold text-gray-900">
                Banco de Prompts
            </a>
            <div class="flex items-center gap-3">
                {% if user.is_staff %}
                <a href="{% url 'admin:index' %}"
                   class="text-sm text-gray-600 hover:text-gray-900 transition-colors">
                    Admin
                </a>
                {% endif %}
                <a href="{% url 'prompts:submit' %}"
                   class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
                    Enviar Prompt
                </a>
            </div>
        </div>
    </nav>

    {% if messages %}
    <div class="max-w-7xl mx-auto px-4 mt-4">
        {% for message in messages %}
        <div class="alert rounded-lg p-4 mb-2 flex items-center justify-between transition-opacity duration-300 {% if message.tags == 'success' %}bg-green-100 text-green-800{% elif message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-blue-100 text-blue-800{% endif %}">
            <span>{{ message }}</span>
            <button type="button" onclick="this.parentElement.remove()"
                    class="ml-4 p-1 rounded hover:bg-black/10 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    <script>
    document.querySelectorAll(".alert").forEach(el => {
        setTimeout(() => {
            el.style.opacity = "0";
            setTimeout(() => el.remove(), 300);
        }, 5000);
    });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
